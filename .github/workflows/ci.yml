name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - name: buf lint
        run: buf lint
      - name: Verify generated code is up-to-date
        run: |
          buf generate
          if ! git diff --quiet -- gen/; then
            echo "::error::generated code is stale; run `buf generate`"
            git --no-pager diff -- gen/
            exit 1
          fi
      - name: Build
        run: go build ./...
      - name: Test
        run: go test -count=1 ./...
