version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/nisarul/Linea-server/gen/go
  disable:
    # Don't rewrite go_package for googleapis — we import the
    # canonical genproto packages instead of regenerating them.
    - module: buf.build/googleapis/googleapis
plugins:
  - remote: buf.build/protocolbuffers/go
    out: gen/go
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/go
    out: gen/go
    opt:
      - paths=source_relative
      - require_unimplemented_servers=true
  - remote: buf.build/grpc-ecosystem/gateway
    out: gen/go
    opt:
      - paths=source_relative
      - generate_unbound_methods=true
inputs:
  - directory: proto
